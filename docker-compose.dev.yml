services:
  postgres:
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    container_name: polka-postgres
    environment:
      POSTGRES_DB: polka
      POSTGRES_USER: polka
      POSTGRES_PASSWORD: polka_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polka -d polka"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: polka-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@polka.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  backend:
    build: ./backend
    container_name: polka-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://polka:polka_dev_password@postgres:5432/polka
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: polka-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend

volumes:
  postgres_data:
